spring.application.name=users-service
server.port=8082

# Eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Database
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/blogs_db
spring.datasource.username=root
spring.datasource.password=vinod267
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.type.contributors=org.hibernate.type.descriptor.java.internal.JsonMapStringTypeDescriptorContributor

# Jackson
spring.jackson.default-property-inclusion=non_null

# Redis
spring.cache.type=redis
spring.cache.cache-names=updateUser,user,updateStatus
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Rate limiting
resilience4j.ratelimiter.instances.myRateLimiter.limitForPeriod=5
resilience4j.ratelimiter.instances.myRateLimiter.limitRefreshPeriod=10s
resilience4j.ratelimiter.instances.myRateLimiter.timeoutDuration=0s

# Kafka
spring.kafka.bootstrap-servers=localhost:9092

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.info=true

# Consumer - SIMPLIFIED AND CORRECT
spring.kafka.consumer.group-id=post-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.demo.kafka,com.example.demo.*
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.demo.kafka.PostEvent