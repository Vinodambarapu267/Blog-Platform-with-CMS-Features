spring.application.name=users-service
server.port=8082
#----------- eureka configuration ----------
eureka.client.register-with-eureka=true
eureka.client.fetch-registry =true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

#---------- Database Configuration -----------
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url = jdbc:mysql://localhost:3306/blogs_db
spring.datasource.username = root
spring.datasource.password = vinod267
spring.jpa.hibernate.ddl-auto = update
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.type.contributors=org.hibernate.type.descriptor.java.internal.JsonMapStringTypeDescriptorContributor

#------------ ignoring of null value-----------
spring.jackson.default-property-inclusion=non_null