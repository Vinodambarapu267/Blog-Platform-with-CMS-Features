version: "3.8"

services:
    api-gateway:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: api-gateway
        ports:
            - "8089:8089"
        environment:
            SERVER_PORT: 8089
            SPRING_APPLICATION_NAME: api-gateway

        restart: unless-stopped
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s
