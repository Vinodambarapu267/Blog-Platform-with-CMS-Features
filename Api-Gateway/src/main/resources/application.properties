spring.application.name=Api-Gateway
server.port=8089

#---------- actuator configuration ----------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.exposure.exclude=env,heapdump,threaddump,configprops
management.endpoints.web.base-path=/actuator

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**


spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://USERS-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/users/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[2].id=post-service
spring.cloud.gateway.routes[2].uri=lb://POSTS-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/posts/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[3].id=category-tag-service-categories
spring.cloud.gateway.routes[3].uri=lb://CATEGORY-TAG-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/categories/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[4].id=category-tag-service-tags
spring.cloud.gateway.routes[4].uri=lb://CATEGORY-TAG-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/tags/**
spring.cloud.gateway.routes[4].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[5].id=comment-service
spring.cloud.gateway.routes[5].uri=lb://COMMENT-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/comments/**
spring.cloud.gateway.routes[5].filters[0]=AuthenticationFilter
