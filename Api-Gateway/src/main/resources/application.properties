spring.application.name=Api-Gateway
server.port=8089

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=http://localhost:5173,http://localhost:3000,http://192.168.1.17:5173,http://192.168.65.1:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].maxAge=3600

# Public route for create user
spring.cloud.gateway.routes[0].id=user-service-create-public
spring.cloud.gateway.routes[0].uri=lb://USERS-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/users/createuser

# Auth routes
spring.cloud.gateway.routes[1].id=auth-service
spring.cloud.gateway.routes[1].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/auth/**

# Protected user routes
spring.cloud.gateway.routes[2].id=user-service
spring.cloud.gateway.routes[2].uri=lb://USERS-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/users/**
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[3].id=post-service
spring.cloud.gateway.routes[3].uri=lb://POSTS-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/posts/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[4].id=category-tag-service-categories
spring.cloud.gateway.routes[4].uri=lb://CATEGORY-TAG-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/categories/**
spring.cloud.gateway.routes[4].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[5].id=category-tag-service-tags
spring.cloud.gateway.routes[5].uri=lb://CATEGORY-TAG-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/tags/**
spring.cloud.gateway.routes[5].filters[0]=AuthenticationFilter

spring.cloud.gateway.routes[6].id=comment-service
spring.cloud.gateway.routes[6].uri=lb://COMMENT-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/comments/**
spring.cloud.gateway.routes[6].filters[0]=AuthenticationFilter