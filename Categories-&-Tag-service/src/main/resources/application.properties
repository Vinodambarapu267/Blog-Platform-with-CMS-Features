spring.application.name=CATEGORY-TAG-SERVICE
server.port=8084
#----------- eureka configuration ----------
eureka.client.register-with-eureka=true
eureka.client.fetch-registry =true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

#---------- Database Configuration -----------
spring.datasource.driver-class-name=${DB_DRIVER_NAME}
spring.datasource.url =${DB_URL}
spring.datasource.username = ${DB_USERNAME}
spring.datasource.password = ${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto = update
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true

#------------ ignoring of null value-----------
spring.jackson.default-property-inclusion=non_null

#---------- actuator configuration ----------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.exposure.exclude=env,heapdump,threaddump,configprops
management.endpoints.web.base-path=/actuator

#--------- redis cache configureation ----------
spring.cache.type=redis
spring.cache.cache-names=category,deleteCategory,updateCategory,allCategories,popularTags,tags
spring.data.redis.host=localhost
spring.data.redis.port=6379


# --------rate limiting -----------
resilience4j.ratelimiter.instances.myRateLimiter.limitForPeriod=5
resilience4j.ratelimiter.instances.myRateLimiter.limitRefreshPeriod=10s
resilience4j.ratelimiter.instances.myRateLimiter.timeoutDuration=0s


