spring.application.name=categories-&-tag-service
server.port=8084
#----------- eureka configuration ----------
eureka.client.register-with-eureka=true
eureka.client.fetch-registry =true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

#---------- Database Configuration -----------
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url = jdbc:mysql://localhost:3306/blogs_db
spring.datasource.username = root
spring.datasource.password = vinod267
spring.jpa.hibernate.ddl-auto = update
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect

#------------ ignoring of null value-----------
spring.jackson.default-property-inclusion=non_null

#--------- redis cache configureation ----------
spring.cache.type=redis
spring.cache.cache-names=popularTags,tags,allCategories,deleteCategory,category
spring.data.redis.host=localhost
spring.data.redis.port=6379


# --------rate limiting -----------
resilience4j.ratelimiter.instances.myRateLimiter.limitForPeriod=5
resilience4j.ratelimiter.instances.myRateLimiter.limitRefreshPeriod=10s
resilience4j.ratelimiter.instances.myRateLimiter.timeoutDuration=0s