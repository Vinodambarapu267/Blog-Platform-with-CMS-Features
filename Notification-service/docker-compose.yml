services:
    zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        container_name: zookeeper
        restart: always
        environment:
            ZOOKEEPER_CLIENT_PORT: 2181
            ZOOKEEPER_TICK_TIME: 2000
        ports:
            - "2181:2181"

    kafka:
        image: confluentinc/cp-kafka:7.5.0
        container_name: kafka
        restart: always
        depends_on:
            - zookeeper
        ports:
            - "9092:9092"
        environment:
            KAFKA_BROKER_ID: 1
            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        healthcheck:
            test:
                [
                    "CMD",
                    "kafka-broker-api-versions",
                    "--bootstrap-server",
                    "kafka:29092",
                ]
            interval: 10s
            timeout: 10s
            retries: 5
            start_period: 60s

    app:
        build: .
        container_name: notification-service
        restart: always
        ports:
            - "8088:8088"
        depends_on:
            kafka:
                condition: service_healthy
        environment:
            SPRING_APPLICATION_NAME: Notification-service
            SERVER_PORT: 8088

            EUREKA_CLIENT_ENABLED: "false"
            SPRING_CLOUD_DISCOVERY_ENABLED: "false"

            SPRING_MAIL_HOST: smtp.gmail.com
            SPRING_MAIL_PORT: 587
            SPRING_MAIL_USERNAME: mallivintech@gmail.com
            SPRING_MAIL_PASSWORD: vpahgxmgiajdrjeh
            SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
            SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
            SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: "true"

            SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
            SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: earliest
            SPRING_KAFKA_CONSUMER_KEY_DESERIALIZER: org.apache.kafka.common.serialization.StringDeserializer
            SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER: org.springframework.kafka.support.serializer.JsonDeserializer
            SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_USE_TYPE_HEADERS: "true"
            SPRING_KAFKA_CONSUMER_PROPERTIES_SPRING_JSON_TRUSTED_PACKAGES: com.example.demo.kafka
