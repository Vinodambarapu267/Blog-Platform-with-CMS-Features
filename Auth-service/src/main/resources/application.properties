spring.application.name=Auth-service
server.port=8081

#---------- Database Configuration ----------
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url = jdbc:mysql://localhost:3306/blogs_db
spring.datasource.username = root
spring.datasource.password = vinod267
spring.jpa.hibernate.ddl-auto = update
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=true


#--------- Eureka configurations -----------
eureka.client.service-url.defaultZone= http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

#------------ Redis configuration ----------
spring.cache.cache-names=userCredentials,tokenValidations,tokenGeneration
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379


# Consumer - SIMPLIFIED AND CORRECT
spring.kafka.consumer.group-id=post-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.demo.kafka,com.example.demo.*
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.demo.kafka.UserEvent