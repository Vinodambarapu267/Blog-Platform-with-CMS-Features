version: "3.8"

services:
    zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        container_name: zookeeper
        restart: always
        environment:
            ZOOKEEPER_CLIENT_PORT: 2181
            ZOOKEEPER_TICK_TIME: 2000

    kafka:
        image: confluentinc/cp-kafka:7.5.0
        container_name: kafka
        restart: always
        depends_on:
            - zookeeper
        ports:
            - "9092:9092"
        environment:
            KAFKA_BROKER_ID: 1
            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        healthcheck:
            test:
                [
                    "CMD",
                    "kafka-broker-api-versions",
                    "--bootstrap-server",
                    "kafka:9092",
                ]
            interval: 10s
            timeout: 10s
            retries: 5
            start_period: 60s

    mysql:
        image: mysql:8.0
        container_name: mysql_db
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: "vinod267"
            MYSQL_DATABASE: "blog_db"
            MYSQL_ROOT_HOST: "%"
        ports:
            - "3307:3306"
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-uroot",
                    "-pvinod267",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 60s
        volumes:
            - mysql-data:/var/lib/mysql

    myapp:
        build: .
        container_name: post-maangement-app
        ports:
            - "8083:8083"
        environment:
            SERVER_PORT: 8083
            SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/blog_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            SPRING_DATASOURCE_USERNAME: root
            SPRING_DATASOURCE_PASSWORD: vinod267
            SPRING_JPA_HIBERNATE_DDL_AUTO: update
            # Kafka config for your Spring Boot app
            SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
            SPRING_KAFKA_CONSUMER_GROUP_ID: blog-group
            SPRING_KAFKA_AUTO_OFFSET_RESET: earliest
        depends_on:
            mysql:
                condition: service_healthy
            kafka:
                condition: service_healthy

volumes:
    mysql-data:
